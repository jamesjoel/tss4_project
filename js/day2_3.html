<!DOCTYPE html>
<html>
<head>
	<title></title>
	<style type="text/css">
		#box{
			height: 100px;
			width: 100px;
			background-color: red;
		}
	</style>
	<script type="text/javascript">
		var w = 100;
		var h = 100;
		function demo1()
		{
			setTimeout("demo2()", 500);
		}
		function demo2()
		{
			document.getElementById("box").style.width=w+"px";
			document.getElementById("box").style.height=h+"px";
			setTimeout("demo2()", 10);
			w++;
			h++;
		}
	</script>
</head>
<body>
<button onclick="demo1()">OK</button>
<div id="box"></div>
</body>
</html>
